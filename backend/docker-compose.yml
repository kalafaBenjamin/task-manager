services:

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager

    ports:
      - "5432:5432"

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db