image: python:3.13

stages:
  - test

variables:
  DB_NAME: taskmanager_test
  DB_USER: taskmanager
  DB_PASSWORD: taskmanager_password
  DB_HOST: postgres
  DB_PORT: "5432"

  POSTGRES_DB: taskmanager_test
  POSTGRES_USER: taskmanager
  POSTGRES_PASSWORD: taskmanager_password

  SECRET_KEY: ci-secret-key-not-for-production
  DEBUG: "False"

services:
  - name: postgres:17
    alias: postgres

before_script:
  - cd backend
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt

test:
  stage: test
  script:
    - python manage.py check
    - python manage.py test