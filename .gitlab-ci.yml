image: python:3.13

stages:
  - test

variables:
  POSTGRES_DB: taskmanager
  POSTGRES_USER: taskmanager
  POSTGRES_PASSWORD: taskmanager_password
  DB_NAME: taskmanager
  DB_USER: taskmanager
  DB_PASSWORD: taskmanager_password
  DB_HOST: postgres
  DB_PORT: 5432
  SECRET_KEY: test-secret-key
  DEBUG: "False"

services:
  - name: postgres:17
    alias: postgres

before_script:
  - cd backend
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - python manage.py migrate

test:
  stage: test
  script:
    - python manage.py test